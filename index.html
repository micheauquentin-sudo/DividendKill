<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#08080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Portfolio IBKR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ─────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{background:#08080f;color:#e2e2ec;font-family:"DM Sans",system-ui,sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
/* ── CSS VARS ──────────────────────────────────────────── */
:root{
  --bg:#08080f;--surface:#111120;--surface2:#1a1a2e;--border:rgba(255,255,255,.07);
  --text:#e2e2ec;--muted:#52527a;--violet:#7c6dff;--teal:#00c8a0;
  --green:#22d47a;--red:#f43f5e;--orange:#f5a623;--blue:#38bdf8;
  --nav-h:52px;--tab-h:60px;
}
/* ── NAV ───────────────────────────────────────────────── */
.nav{position:sticky;top:0;z-index:300;height:var(--nav-h);background:#0c0c18;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:12px}
.logo{font-weight:700;font-size:17px;letter-spacing:-.5px;white-space:nowrap}
.logo em{color:var(--violet);font-style:normal}
.logo-tag{font-size:9px;font-weight:600;background:var(--surface2);color:var(--muted);padding:2px 5px;border-radius:4px;margin-left:5px;vertical-align:middle;letter-spacing:.3px}
.nav-status{display:flex;align-items:center;gap:6px;flex:1;justify-content:center;font-size:10px;color:var(--muted)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.status-dot.err{background:var(--red)}
.status-dot.load{background:var(--orange);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-btn{padding:6px 13px;border-radius:20px;border:1px solid rgba(0,200,160,.3);background:rgba(0,200,160,.07);color:var(--teal);font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
/* ── KPI BAR ───────────────────────────────────────────── */
.kpi-bar{display:none;background:#0c0c18;border-bottom:1px solid var(--border)}
.kpi-bar.on{display:flex}
.kc{flex:1;min-width:0;padding:10px 5px;display:flex;flex-direction:column;gap:2px;border-right:1px solid var(--border);overflow:hidden}
.kc:last-child{border-right:none}
.kc-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);white-space:nowrap}
.kc-v{font-family:"DM Mono",monospace;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kc-s{font-size:9px;color:var(--muted);white-space:nowrap}
/* ── PANELS ─────────────────────────────────────────────── */
.panel{display:none;min-height:calc(100vh - var(--nav-h) - var(--tab-h));padding:16px 14px 80px}
.panel.on{display:block}
/* ── TABS ───────────────────────────────────────────────── */
.tabs{position:sticky;bottom:0;z-index:300;height:var(--tab-h);background:#0c0c18;border-top:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 14px;color:var(--muted);font-size:9px;font-weight:600;letter-spacing:.3px;min-width:62px;border-top:2px solid transparent;transition:color .15s,border-color .15s;user-select:none}
.tab.on{color:var(--violet);border-top-color:var(--violet)}
.tab-icon{font-size:15px;line-height:1.2}
/* ── COMPOSANTS ─────────────────────────────────────────── */
.card{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:10px}
.section-title{font-size:17px;font-weight:700;margin-bottom:14px;letter-spacing:-.3px}
.badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:9.5px;font-weight:600;background:var(--surface2);color:#8888aa;white-space:nowrap}
/* ── KPI CARDS ROW ──────────────────────────────────────── */
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.mini-k{background:var(--surface);border-radius:10px;padding:12px 10px;text-align:center}
.mini-k-l{font-size:9px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.mini-k-v{font-size:18px;font-weight:700;font-family:"DM Mono",monospace;line-height:1}
.mini-k-s{font-size:9px;color:var(--muted);margin-top:2px}
/* ── TABLE ──────────────────────────────────────────────── */
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;background:var(--surface);margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#0d0d1e;padding:9px 6px;text-align:left;font-size:9.5px;font-weight:700;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--border);letter-spacing:.3px;cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(124,109,255,.04)}
tbody td{padding:9px 6px;vertical-align:middle}
/* ── ACCUEIL ─────────────────────────────────────────────── */
.home-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.home-nav{font-size:36px;font-weight:700;letter-spacing:-2px;line-height:1;margin-bottom:8px;font-family:"DM Mono",monospace}
.home-sub{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.home-pnl{font-size:16px;font-weight:700;font-family:"DM Mono",monospace}
.badge-up{background:rgba(16,185,129,.15);color:#10b981;padding:3px 10px;border-radius:9px;font-size:11px;font-weight:700;font-family:"DM Mono",monospace}
.badge-dn{background:rgba(244,63,94,.15);color:#f43f5e;padding:3px 10px;border-radius:9px;font-size:11px;font-weight:700;font-family:"DM Mono",monospace}
.home-chart{background:var(--surface2);border-radius:10px;overflow:hidden;margin:0 -2px 10px}
.chart-toggle{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.ctbtn{padding:5px 14px;border-radius:14px;font-size:11px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.ctbtn.on{border-color:var(--violet);background:rgba(124,109,255,.12);color:var(--violet)}
.movers{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mover-t{font-size:10px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mrow:last-child{border-bottom:none}
.mrow-tk{font-size:12px;font-weight:700}
.mrow-v{font-size:11.5px;font-family:"DM Mono",monospace;font-weight:600}
/* ── SECTEURS ────────────────────────────────────────────── */
.sb-wrap{margin-bottom:13px}
.sb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.sb-name{font-size:12.5px;font-weight:600}
.sb-info{font-size:11px;color:var(--muted)}
.sb-bg{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden}
.sb-fill{height:100%;border-radius:4px;transition:width .5s ease}
/* ── VALORISATION ────────────────────────────────────────── */
.val-card{border-radius:11px;padding:13px;margin-bottom:8px;background:var(--surface);border-left:3px solid}
.val-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.val-tk{font-weight:700;font-size:14px}
.val-name{font-size:11px;color:var(--muted);margin-left:6px}
.val-sig{padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(0,0,0,.25)}
.val-row{display:flex;gap:12px;flex-wrap:wrap}
.val-cell{min-width:0}
.val-cell-l{font-size:9px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.val-cell-v{font-size:12.5px;font-family:"DM Mono",monospace;font-weight:500}
/* ── DEAL ────────────────────────────────────────────────── */
.deal-card{border-radius:12px;padding:14px;margin-bottom:10px;background:var(--surface);border-left:3px solid var(--green)}
.deal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.deal-tk{font-weight:700;font-size:15px}
.deal-name{font-size:11px;color:var(--muted)}
.deal-yield{color:var(--green);font-weight:700;font-family:"DM Mono",monospace;font-size:13px}
.deal-info{font-size:11px;color:var(--muted)}
.deal-tags{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap}
.deal-tag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600}
/* ── NEWS ────────────────────────────────────────────────── */
.news-card{border-radius:12px;padding:14px;margin-bottom:10px;background:var(--surface)}
.news-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;justify-content:space-between}
.news-tk{font-weight:700;font-size:13px}
.news-tag{padding:2px 8px;border-radius:9px;font-size:9.5px;font-weight:700}
.news-title{font-size:13px;font-weight:600;margin-bottom:5px;line-height:1.35}
.news-body{font-size:11.5px;color:var(--muted);line-height:1.55}
/* ── DIVIDENDES ──────────────────────────────────────────── */
.div-snowball{background:linear-gradient(135deg,rgba(34,212,122,.08),rgba(124,109,255,.05));border:1px solid rgba(34,212,122,.2);border-radius:12px;padding:14px;margin-bottom:16px}
.div-snowball-title{font-size:12px;font-weight:700;color:var(--green);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
/* ── IMPOTS ──────────────────────────────────────────────── */
.tax-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.tax-row:last-child{border-bottom:none}
.tax-l{color:var(--muted);font-size:12.5px}
.tax-v{font-family:"DM Mono",monospace;font-size:12.5px;font-weight:600}
/* ── SAFE SCORE ──────────────────────────────────────────── */
.safe-bar{height:4px;border-radius:2px;background:var(--surface2);margin-top:3px;overflow:hidden}
.safe-fill{height:100%;border-radius:2px}
/* ── UTILS ───────────────────────────────────────────────── */
.up{color:var(--green)}.dn{color:var(--red)}.mu{color:var(--muted)}
.mono{font-family:"DM Mono",monospace}
.fw7{font-weight:700}

/* ── TOGGLE SWITCH ──────────────────────────────────────── */
.toggle{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#2a2a3e;border-radius:24px;transition:.3s}
.toggle-slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked + .toggle-slider{background:var(--violet)}
.toggle input:checked + .toggle-slider:before{transform:translateX(20px)}
</style>

<script>
/* ================================================================
   SNOWBALL PORTFOLIO — v5.0 ES6 Modulaire Inline
   Architecture: Namespaces ES6, const/let, arrow functions
   Zéro bundler requis — même fichier HTML
   ================================================================ */

'use strict';

/* ════════════════════════════════════════════════════════════════
   MODULE: Config — Constantes globales
   ════════════════════════════════════════════════════════════════ */
const Config = {
  EURUSD:    1.1611,
  NAV_EUR:   25000,
  PFU:       0.314,
  TARGET_MONTHLY: 1500,
  MARKET_CACHE_TTL: 5 * 60 * 1000,  // 5 min (Yahoo sans limite)
  YF_BASE: 'https://divkiller.michooo-45.workers.dev',
};



/* ════════════════════════════════════════════════════════════════
   MODULE: MarketData — Yahoo Finance (query1, sans clé API)
   Batch fetch, cache 5min localStorage, refresh auto
   ════════════════════════════════════════════════════════════════ */
const MarketData = (() => {

  const _cache = {};
  let _refreshTimer = null;
  let _onUpdateCb   = null;
  let _status       = 'idle';
  const CACHE_KEY   = 'astra_market_cache_yf';

  function _saveCache() {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(_cache)); } catch(e) {}
  }
  function _loadCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return;
      const parsed = JSON.parse(raw);
      const now = Date.now();
      for (const [t, d] of Object.entries(parsed)) {
        if (now - d.ts < 24 * 3600 * 1000) _cache[t] = d;
      }
    } catch(e) {}
  }
  function _isFresh(ticker) {
    const c = _cache[ticker];
    return c && (Date.now() - c.ts < Config.MARKET_CACHE_TTL);
  }

  /* ── Fetch batch Yahoo Finance ── */
  async function _fetchYahooQuotes(tickers) {
    const symbols = tickers.join(',');
    const fields  = [
      'regularMarketPrice','regularMarketChange','regularMarketChangePercent',
      'regularMarketPreviousClose','regularMarketVolume',
      'trailingPE','forwardPE','dividendYield',
      'trailingAnnualDividendRate','exDividendDate','marketState'
    ].join(',');
    const url = `${Config.YF_BASE}?symbols=${encodeURIComponent(symbols)}&fields=${fields}&lang=en-US&region=US`;
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error(`Yahoo Finance HTTP ${res.status}`);
    const json = await res.json();
    const results = json?.quoteResponse?.result;
    if (!results || results.length === 0) throw new Error('Yahoo: aucun résultat');
    return results;
  }

  function _normalize(q) {
    return {
      price:      q.regularMarketPrice           || null,
      change:     q.regularMarketChange          || 0,
      changePct:  q.regularMarketChangePercent   || 0,
      prevClose:  q.regularMarketPreviousClose   || null,
      volume:     q.regularMarketVolume          || null,
      pe_cur:     q.trailingPE                  || null,
      pe_fwd:     q.forwardPE                   || null,
      div_yield:  q.dividendYield               || null,
      annual_div: q.trailingAnnualDividendRate  || null,
      ex_date:    q.exDividendDate              || null,
      marketState: q.marketState               || 'REGULAR',
    };
  }

  async function getQuote(ticker) {
    if (_isFresh(ticker) && _cache[ticker]?.quote) return _cache[ticker].quote;
    const results = await _fetchYahooQuotes([ticker]);
    const q = results.find(r => r.symbol === ticker);
    if (!q) throw new Error(`Yahoo: pas de quote pour ${ticker}`);
    const quote = _normalize(q);
    _cache[ticker] = { ..._cache[ticker], quote, ts: Date.now() };
    _saveCache();
    return quote;
  }

  async function getDividendData(ticker) {
    const q = await getQuote(ticker);
    return { annual_div: q.annual_div, yield: q.div_yield, ex_date: q.ex_date, pay_date: null, div_cagr_5y: null };
  }

  async function getFundamentals(ticker) {
    const q = await getQuote(ticker);
    return { pe_cur: q.pe_cur, pe_5y: q.pe_fwd, payout_ratio: null, fcf_yield: null,
             debt_equity: null, beta: null, market_cap: null, sector: null,
             dividend_per_share: q.annual_div, ex_div_date: q.ex_date };
  }

  async function refreshAll(tickers, onUpdate) {
    _status = 'loading';
    _onUpdateCb = onUpdate || null;
    _setNavStatus('loading', 'Actualisation prix...');

    // Callbacks immédiats pour les tickers en cache frais
    tickers.filter(t => _isFresh(t) && _cache[t]?.quote)
           .forEach(t => { if (_onUpdateCb) _onUpdateCb(t, _cache[t].quote); });

    const toFetch = tickers.filter(t => !_isFresh(t));
    let success = tickers.length - toFetch.length;
    let errors  = 0;

    if (toFetch.length > 0) {
      try {
        const results = await _fetchYahooQuotes(toFetch);
        const now = Date.now();
        results.forEach(q => {
          const quote = _normalize(q);
          _cache[q.symbol] = { ..._cache[q.symbol], quote, ts: now };
          if (_onUpdateCb) _onUpdateCb(q.symbol, quote);
          success++;
        });
        _saveCache();
        errors = toFetch.filter(t => !results.find(r => r.symbol === t)).length;
      } catch(e) {
        console.warn('[MarketData] Yahoo batch error:', e.message);
        errors = toFetch.length;
      }
    }

    _status = errors === tickers.length ? 'error' : 'ok';
    _setNavStatus(_status === 'error' ? 'err' : 'ok', `Prix mis à jour (${success}/${tickers.length})`);
    _scheduleRefresh(tickers, onUpdate);
    return { success, errors };
  }

  /* ── Prix courant depuis cache (sync, pour compatibilité avec Data.currentPrices) ── */
  function getCachedPrice(ticker) {
    return _cache[ticker]?.quote?.price || null;
  }

  function getCachedChange(ticker) {
    return _cache[ticker]?.quote?.change || null;
  }

  /* ── Helpers internes ── */
  function _scheduleRefresh(tickers, onUpdate) {
    if (_refreshTimer) clearTimeout(_refreshTimer);
    _refreshTimer = setTimeout(() => refreshAll(tickers, onUpdate), Config.MARKET_CACHE_TTL);
  }

  function _setNavStatus(type, msg) {
    // Met à jour le dot + texte dans la nav
    const dot  = document.querySelector('.status-dot');
    const text = document.querySelector('.nav-status span') || document.querySelector('.nav-status');
    if (dot) { dot.className = 'status-dot' + (type === 'loading' ? ' load' : type === 'err' ? ' err' : ''); }
    if (text) { const el = text.tagName === 'SPAN' ? text : text.querySelector('span'); if(el) el.textContent = msg; }
  }

  function getStatus() { return _status; }

  function getCacheInfo() {
    const tickers = Object.keys(_cache);
    const fresh   = tickers.filter(t => _isFresh(t)).length;
    return { total: tickers.length, fresh, stale: tickers.length - fresh };
  }

  /* ── Init : charge cache persisté ── */
  _loadCache();

  function clearCache() {
    for (const k in _cache) delete _cache[k];
    try { localStorage.removeItem(CACHE_KEY); } catch(e) {}
  }

  return {
    getQuote,
    getDividendData,
    getFundamentals,
    refreshAll,
    clearCache,
    getCachedPrice,
    getCachedChange,
    getStatus,
    getCacheInfo,
  };

})();

/* ════════════════════════════════════════════════════════════════
   MODULE: Data — Données statiques (prices, assets, transactions)
   ════════════════════════════════════════════════════════════════ */
const Data = (() => {

/* ════════════════════════════════════════════════════════════════
   MODULE: Calc — Calculs portfolio (positions, agrégats)
   ════════════════════════════════════════════════════════════════ */
const Calc = (() => {

  const eu    = () => Data.PERF ? (window.EURUSD || Config.EURUSD) : Config.EURUSD;
  const toE   = v => v / Config.EURUSD;
  const fE    = v => `${Math.round(toE(v)).toLocaleString('fr-FR')} €`;
  const fEsign = v => `${v >= 0 ? '+' : ''}${fE(v)}`;
  const fPct  = (v, d = 2) => `${v >= 0 ? '+' : ''}${v.toFixed(d)}%`;

  const computePositions = () => {
    const pos = {};
    for (const tx of Data.transactions) {
      if (!pos[tx.ticker]) pos[tx.ticker] = { ticker: tx.ticker, shares: 0, totalCost: 0, realizedGain: 0, totalDividends: 0, totalTaxPaid: 0 };
      const p = pos[tx.ticker];
      if (tx.type === 'buy') {
        p.totalCost += tx.quantity * tx.price + tx.fees;
        p.shares    += tx.quantity;
      } else if (tx.type === 'sell') {
        const avgP = p.shares > 0 ? p.totalCost / p.shares : 0;
        p.realizedGain += tx.quantity * (tx.price - avgP) - tx.fees;
        p.totalCost    -= avgP * tx.quantity;
        p.shares       -= tx.quantity;
      } else if (tx.type === 'dividend') {
        p.totalDividends += tx.quantity * tx.price;
        p.totalTaxPaid   += tx.tax_withheld;
      }
    }
    const result = [];
    for (const ticker in pos) {
      if (!Object.prototype.hasOwnProperty.call(pos, ticker)) continue;
      const p2 = pos[ticker];
      if (p2.shares <= 0) continue;
      const a   = Data.assets[ticker] || {};
      const price = Data.currentPrices[ticker] || 0;
      const avg   = p2.shares > 0 ? p2.totalCost / p2.shares : 0;
      const mv    = p2.shares * price;
      result.push({
        ticker, name: a.name || ticker, sec: a.sector || '?',
        qty: p2.shares, price, avg, mv,
        pnl: mv - p2.totalCost,
        dpnl: (Data.dailyChange[ticker] || 0) * p2.shares,
        totalCost: p2.totalCost, realizedGain: p2.realizedGain,
        totalDividends: p2.totalDividends, totalTaxPaid: p2.totalTaxPaid,
        unrealizedGain: mv - p2.totalCost,
      });
    }
    result.sort((a, b) => b.mv - a.mv);
    return result;
  };

  let raw = computePositions();

  const getMV    = () => raw.reduce((s, d) => s + d.mv, 0);
  const getCost  = () => raw.reduce((s, d) => s + d.avg * d.qty, 0);
  const getPNL   = () => raw.reduce((s, d) => s + d.pnl, 0);
  const getDivA  = () => raw.reduce((s, d) => s + (Data.assets[d.ticker]?.d || 0) * d.qty, 0);

  const recompute = () => { raw = computePositions(); };

  const getTotalDividends = () => raw.reduce((s, d) => s + (d.totalDividends || 0), 0);
  const getTotalTaxes     = () => raw.reduce((s, d) => s + (d.totalTaxPaid   || 0), 0);
  const getRealizedGains  = () => raw.reduce((s, d) => s + (d.realizedGain   || 0), 0);
  const getPositions      = () => raw; // alias lisible pour positions[]

  const safetyLabel = sc => {
    if (sc >= 90) return {txt:'Excellent', col:'#22d47a', bg:'rgba(34,212,122,.12)'};
    if (sc >= 75) return {txt:'Sûr',       col:'#86efad', bg:'rgba(134,239,173,.1)'};
    if (sc >= 60) return {txt:'OK',         col:'#f5a623', bg:'rgba(245,166,35,.1)'};
    if (sc >= 45) return {txt:'Risqué',    col:'#fb923c', bg:'rgba(251,146,60,.1)'};
    return              {txt:'Danger',    col:'#f43f5e', bg:'rgba(244,63,94,.1)'};
  };

  return { eu, toE, fE, fEsign, fPct, getMV, getCost, getPNL, getDivA,
           getTotalDividends, getTotalTaxes, getRealizedGains, getPositions,
           get raw() { return raw; }, recompute, safetyLabel, computePositions };
})();

const DividendSafety = (() => {

  const WEIGHTS = {payout_ratio:.25,fcf_payout:.20,debt_ebitda:.15,interest_cov:.10,div_streak:.10,div_cagr_5y:.10,earn_stability:.05,recession_res:.05};

    'Utilities':{payout_ratio_ok:.75,payout_ratio_warn:.85,fcf_payout_ok:.80,fcf_payout_warn:.90,debt_ebitda_ok:5.0,debt_ebitda_warn:7.0,interest_cov_ok:2.5,note:'Utilities : capex régulier justifie dette élevée'},
    _default:   {payout_ratio_ok:.60,payout_ratio_warn:.75,fcf_payout_ok:.65,fcf_payout_warn:.80,debt_ebitda_ok:3.0,debt_ebitda_warn:4.5,interest_cov_ok:3.0,note:null}
  };

  const getSectorProfile = s => SECTOR_PROFILES[s] || SECTOR_PROFILES._default;
  const linearScore = (val, good, bad, inv) => {
    if (inv) { if (val <= good) return 100; if (val >= bad) return 0; return Math.round(100*(bad-val)/(bad-good)); }
    else      { if (val >= good) return 100; if (val <= bad) return 0; return Math.round(100*(val-bad)/(good-bad)); }
  };

  const scorePayout     = (v,p) => linearScore(v, p.payout_ratio_ok, p.payout_ratio_warn+.15, true);
  const scoreFCF        = (v,p) => linearScore(v, p.fcf_payout_ok,   p.fcf_payout_warn+.15,   true);
  const scoreDebt       = (v,p) => linearScore(v, p.debt_ebitda_ok,  p.debt_ebitda_warn+2.0,  true);
  const scoreIntCov     = (v,p) => linearScore(v, p.interest_cov_ok*3, p.interest_cov_ok*.7,  false);
  const scoreStreak     = y => y>=50?100:y>=25?85+Math.round((y-25)/25*15):y>=10?55+Math.round((y-10)/15*30):y>=5?25+Math.round((y-5)/5*30):Math.round(y*5);
  const scoreDivCAGR    = c => linearScore(c, .08, .02, false);
  const scoreEarnStab   = (pc,p5) => { if(!p5||p5<=0)return 50; const r=pc/p5; if(r>=.75&&r<=1.25)return 100; if(r>=.60&&r<=1.40)return 70; if(r>=.50&&r<=1.60)return 45; return 20; };
  const scoreRecession  = (sec,streak,payout) => {
    const d={'Santé':90,'Utilities':85,'Conso.':75,'Immo.':65,'Finance':55,'Industrie':50,'Tech':45,'Mat.':40,'Médias':35};
    const base=d[sec]||50, sb=streak>=25?10:streak>=10?5:0, pm=payout>.80?-15:payout>.65?-5:0;
    return Math.max(0, Math.min(100, base+sb+pm));
  };
  const estDebtEbitda   = s => s.debt_ebitda !== undefined ? s.debt_ebitda : (s.debt_equity||0)*2.0;
  const estInterestCov  = s => {
    if (s.interest_coverage !== undefined) return s.interest_coverage;
    const de=s.debt_equity||0, fy=s.fcf_yield||0;
    if (de===0) return 15;
    return Math.max(1, Math.min(20, (fy*100)/(de*1.5+.5)));
  };

  const calculate = stock => {
    const p = getSectorProfile(stock.sector);
    const payout=stock.payout_ratio||0, fcfP=stock.fcf_payout||0;
    const debtE=estDebtEbitda(stock), intC=estInterestCov(stock);
    const streak=stock.streak||0, cagr=stock.div_cagr_5y||0;
    const peCur=stock.pe_cur||0, pe5y=stock.pe_5y||0, sec=stock.sector||'';
    const scores = {
      payout_ratio: scorePayout(payout,p), fcf_payout: scoreFCF(fcfP,p),
      debt_ebitda: scoreDebt(debtE,p), interest_cov: scoreIntCov(intC,p),
      div_streak: scoreStreak(streak), div_cagr_5y: scoreDivCAGR(cagr),
      earn_stability: scoreEarnStab(peCur,pe5y), recession_res: scoreRecession(sec,streak,payout)
    };
    let total = 0;
    for (const k in WEIGHTS) total += (scores[k]||0) * WEIGHTS[k];
    total = Math.round(total);
    const risk = total>=80?'SAFE':total>=65?'MODERATE':total>=50?'CAUTION':total>=35?'RISKY':'DANGER';
    const LABELS = {payout_ratio:'Payout ratio trop élevé',fcf_payout:'FCF payout insuffisant',debt_ebitda:'Endettement excessif',interest_cov:'Couverture intérêts faible',div_streak:'Historique dividendes court',div_cagr_5y:'Croissance dividende faible',earn_stability:'Résultats instables',recession_res:'Vulnérable en récession'};
    const weak=[], str=[];
    for (const c in scores) {
      const s=scores[c];
      if (s<50)   weak.push({key:c,label:LABELS[c],score:s,weight:Math.round(WEIGHTS[c]*100)+'%'});
      else if (s>=75) str.push({key:c,label:LABELS[c],score:s,weight:Math.round(WEIGHTS[c]*100)+'%'});
    }
    weak.sort((a,b) => a.score-b.score);
    str.sort((a,b)  => b.score-a.score);
    return {safetyScore:total, riskLevel:risk, weakPoints:weak, strengths:str, breakdown:scores, sectorNote:p.note||null};
  };

  const color = sc => sc>=80?'#22d47a':sc>=65?'#86efad':sc>=50?'#f5a623':sc>=35?'#fb923c':'#f43f5e';
  const label = rl => ({SAFE:'Sûr',MODERATE:'Modéré',CAUTION:'Prudence',RISKY:'Risqué',DANGER:'Danger'}[rl]||rl);

  const getPortfolioDSE = () => {
    let totalMV = 0, weightedDSE = 0;
    for (const pos of Calc.raw) {
      const m = Data.assets[pos.ticker] || {};
      const dse = calculate(m).safetyScore;
      weightedDSE += dse * pos.mv;
      totalMV += pos.mv;
    }
    return totalMV > 0 ? Math.round(weightedDSE / totalMV) : 0;
  };

  return { calculate, color, label, getPortfolioDSE };
})();

/* ── AES-GCM helpers ── */
const _AES = (() => {
  async function deriveKey() {
    const raw = new TextEncoder().encode(`astra_key_${location.hostname||'local'}_v1`);
    const base = await crypto.subtle.importKey('raw', raw, 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name:'PBKDF2', salt: new TextEncoder().encode('astra_salt_2024'), iterations:100000, hash:'SHA-256' },
      base, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
    );
  }
  async function encrypt(data) {
    const key = await deriveKey();
    const iv  = crypto.getRandomValues(new Uint8Array(12));
    const enc = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, new TextEncoder().encode(JSON.stringify(data)));
    const out = new Uint8Array(12 + enc.byteLength);
    out.set(iv); out.set(new Uint8Array(enc), 12);
    return btoa(String.fromCharCode(...out));
  }
  async function decrypt(b64) {
    const key  = await deriveKey();
    const buf  = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const dec  = await crypto.subtle.decrypt({name:'AES-GCM', iv: buf.slice(0,12)}, key, buf.slice(12));
    return JSON.parse(new TextDecoder().decode(dec));
  }
  return { encrypt, decrypt };
})();

/* ── IndexedDB core ── */
const AstraDB = (() => {
  const DB_NAME = 'astra_db', DB_VERSION = 1;
  const STORES = { transactions:'transactions', snapshots:'snapshots', settings:'settings', dividendHistory:'dividend_history' };
  const ENC_STORES = new Set(['transactions','settings']);
  let _db = null;

  function open() {
    if (_db) return Promise.resolve(_db);
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('transactions')) {
          const s = db.createObjectStore('transactions', {keyPath:'id', autoIncrement:true});
          s.createIndex('ticker','ticker',{unique:false});
          s.createIndex('date','date',{unique:false});
        }
        if (!db.objectStoreNames.contains('snapshots'))
          db.createObjectStore('snapshots', {keyPath:'date'});
        if (!db.objectStoreNames.contains('settings'))
          db.createObjectStore('settings', {keyPath:'key'});
        if (!db.objectStoreNames.contains('dividend_history')) {
          const dh = db.createObjectStore('dividend_history', {keyPath:'id', autoIncrement:true});
          dh.createIndex('ticker','ticker',{unique:false});
        }
      };
      req.onsuccess = e => { _db = e.target.result; res(_db); };
      req.onerror   = e => rej(e.target.error);
    });
  }

  async function getAll(storeName) {
    const db  = await open();
    const enc = ENC_STORES.has(storeName);
    return new Promise((res, rej) => {
      const req = db.transaction(storeName,'readonly').objectStore(storeName).getAll();
      req.onsuccess = async e => {
        if (!enc) { res(e.target.result); return; }
        try {
          res(await Promise.all(e.target.result.map(r => r.__enc ? _AES.decrypt(r.payload) : r)));
        } catch(err) { console.error('[AstraDB] decrypt',err); res([]); }
      };
      req.onerror = e => rej(e.target.error);
    });
  }

  async function get(storeName, key) {
    const db  = await open();
    const enc = ENC_STORES.has(storeName);
    return new Promise((res, rej) => {
      const req = db.transaction(storeName,'readonly').objectStore(storeName).get(key);
      req.onsuccess = async e => {
        const r = e.target.result;
        if (!r) { res(null); return; }
        res(enc && r.__enc ? await _AES.decrypt(r.payload) : r);
      };
      req.onerror = e => rej(e.target.error);
    });
  }

  async function putAll(storeName, items) {
    const db  = await open();
    const enc = ENC_STORES.has(storeName);
    return new Promise((res, rej) => {
      const tx    = db.transaction(storeName,'readwrite');
      const store = tx.objectStore(storeName);
      const go = async i => {
        if (i >= items.length) return;
        let item = items[i];
        if (enc) {
          const payload = await _AES.encrypt(item);
          item = { __enc:true, payload };
        }
        const r = store.put(item);
        r.onsuccess = () => go(i+1);
        r.onerror   = e  => rej(e.target.error);
      };
      go(0);
      tx.oncomplete = () => res(true);
      tx.onerror    = e  => rej(e.target.error);
    });
  }

  async function deleteRecord(storeName, key) {
    const db = await open();
    return new Promise((res, rej) => {
      const req = db.transaction(storeName,'readwrite').objectStore(storeName).delete(key);
      req.onsuccess = () => res(true);
      req.onerror   = e  => rej(e.target.error);
    });
  }

  async function clearBySource(source) {
    const db = await open();
    const all = await getAll('transactions');
    return new Promise((res, rej) => {
      const tx = db.transaction('transactions','readwrite');
      const store = tx.objectStore('transactions');
      const cur = store.openCursor();
      cur.onsuccess = e => {
        const c = e.target.result;
        if (!c) return;
        if (source === null || c.value.source === source || (source === 'imported' && c.value.source !== 'manual'))
          c.delete();
        c.continue();
      };
      tx.oncomplete = res;
      tx.onerror    = e => rej(e.target.error);
    });
  }

  async function getSetting(key, def=null) {
    const r = await get('settings', key);
    return r ? r.value : def;
  }
  async function setSetting(key, value) {
    const db = await open();
    return new Promise((res, rej) => {
      const req = db.transaction('settings','readwrite').objectStore('settings').put({key, value});
      req.onsuccess = () => res(true);
      req.onerror   = e  => rej(e.target.error);
    });
  }

  /* API publique générique */
  async function saveData(storeName, data, id=null) {
    const items = Array.isArray(data) ? data : [data];
    if (id !== null && !Array.isArray(data)) items[0] = {...items[0], [storeName==='settings'?'key':'id']: id};
    return putAll(storeName, items);
  }
  const loadData   = (s, q=null) => q !== null ? get(s, q) : getAll(s);
  const updateData = async (s, id, patch) => {
    const ex = await get(s, id);
    if (!ex) throw new Error(`[AstraDB] updateData: ${id} not found in ${s}`);
    return saveData(s, {...ex, ...patch}, id);
  };
  const deleteData = deleteRecord;

  return { open, getAll, get, putAll, deleteRecord, clearBySource, getSetting, setSetting, saveData, loadData, updateData, deleteData, STORES };
})();

/* ── Storage (API rétrocompat + migration) ── */
const Storage = (() => {
  /* Sync wrappers — pour code legacy qui n'est pas async */
  let _cache = { imported: [], manual: [] };

  /* Chargement initial async (appelé au boot) */
  async function hydrate() {
    const all = await AstraDB.getAll('transactions');
    _cache.imported = all.filter(r => r.source !== 'manual');
    _cache.manual   = all.filter(r => r.source === 'manual');
  }

  /* Sync reads (depuis cache) */
  const load       = () => _cache.imported;
  const loadManual = () => _cache.manual;

  /* Async writes + mise à jour cache */
  const save = async arr => {
    _cache.imported = arr;
    await AstraDB.clearBySource('imported');
    if (arr.length) await AstraDB.putAll('transactions', arr.map(r => ({...r, source: r.source||'imported'})));
  };
  const saveManual = async arr => {
    _cache.manual = arr;
    await AstraDB.clearBySource('manual');
    if (arr.length) await AstraDB.putAll('transactions', arr.map(r => ({...r, source:'manual'})));
  };
  const clear       = async () => { _cache.imported = []; await AstraDB.clearBySource('imported'); };
  const clearManual = async () => { _cache.manual   = []; await AstraDB.clearBySource('manual'); };

  /* Migration depuis localStorage */
  async function migrateLS() {
    const done = await AstraDB.getSetting('migration_done');
    if (done) return;
    let n = 0;
    for (const [k, src] of [['snowball_imported','imported'],['snowball_manual','manual']]) {
      const raw = localStorage.getItem(k);
      if (!raw) continue;
      try {
        const data = JSON.parse(raw);
        if (Array.isArray(data) && data.length) {
          await AstraDB.putAll('transactions', data.map(r => ({...r, source:src})));
          localStorage.removeItem(k);
          n++;
          console.log(`[Storage] Migration OK: ${k} (${data.length} entrées)`);
        }
      } catch(e) { console.warn('[Storage] Migration échouée:', k, e); }
    }
    await AstraDB.setSetting('migration_done', {date: new Date().toISOString(), v:1});
    if (n) console.log('[Storage] Migration localStorage → IndexedDB terminée ✓');
  }

  async function init() {
    await AstraDB.open();
    await migrateLS();
    await hydrate();
    console.log('[Storage] Prêt ✓ (IndexedDB + AES-GCM)');
  }

  return { load, save, clear, loadManual, saveManual, clearManual, init, hydrate };
})();

/* ════════════════════════════════════════════════════════════════
   MODULE: BrokerImport — Parsing CSV multi-brokers
   ════════════════════════════════════════════════════════════════ */
const BrokerImport = (() => {

  const parseCSV = text => {
    const firstLine = text.split('\n')[0] || '';
    const delim = (firstLine.match(/;/g)||[]).length > (firstLine.match(/,/g)||[]).length ? ';' : ',';
    const rows = [];
    for (const line of text.split('\n')) {
      const trimmed = line.trim();
      if (!trimmed) continue;
      const cols = []; let inQ = false, cur = '';
      for (const ch of trimmed) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === delim && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      cols.push(cur.trim());
      rows.push(cols);
    }
    return rows;
  };

  const detectBroker = (text, headers) => {
    const t = text.toLowerCase(), h = (headers||[]).join(' ').toLowerCase();
    if (t.includes('interactive brokers') || t.includes('ibkr') || h.includes('conid')) return 'IBKR';
    if (t.includes('trade republic') || (h.includes('isin') && h.includes('shares') && h.includes('average price'))) return 'TradeRepublic';
    if (h.includes('isin') && (h.includes('degiro') || h.includes('nombre') || h.includes('cours'))) return 'Degiro';
    return 'Unknown';
  };

  const mapColumns = (headers, broker) => {
    const h = headers.map(x => x.toLowerCase().trim());
    const find = candidates => {
      for (const c of candidates) for (let j=0; j<h.length; j++) if (h[j].includes(c)) return j;
      return -1;
    };
    const maps = {
      IBKR:          {type:find(['type','transaction type','activity type']),ticker:find(['symbol','ticker']),date:find(['date','trade date','settlement date']),quantity:find(['quantity','qty','shares']),price:find(['price','t. price','trprice']),fees:find(['commission','fee','frais']),currency:find(['currency','ccy']),tax:find(['withholding','tax','retenue'])},
      TradeRepublic:  {type:find(['type','transaction type']),ticker:find(['symbol','isin','ticker']),date:find(['date','booking date','value date']),quantity:find(['shares','quantity','nombre']),price:find(['average price','price','cours']),fees:find(['fee','commission','frais']),currency:find(['currency','devise']),tax:find(['tax','impot','retenue','withholding'])},
      Degiro:         {type:find(['type','order type']),ticker:find(['product','isin','symbole']),date:find(['date','datum']),quantity:find(['quantity','nombre','qty']),price:find(['price','cours','koers']),fees:find(['frais','fee','couts']),currency:find(['currency','devise','valuta']),tax:find(['tax','impot','retenue'])},
    };
    return maps[broker] || {type:find(['type','transaction type','activity']),ticker:find(['symbol','ticker','isin','product']),date:find(['date','trade date']),quantity:find(['quantity','qty','shares','nombre']),price:find(['price','cours']),fees:find(['fee','commission','frais']),currency:find(['currency','devise']),tax:find(['withholding','tax','retenue'])};
  };

  const normalizeType = raw => {
    if (!raw) return null;
    const r = raw.toLowerCase().trim();
    if (r.includes('buy') || r.includes('achat') || r === 'b') return 'buy';
    if (r.includes('sell') || r.includes('vente') || r === 's') return 'sell';
    if (r.includes('dividend') || r.includes('dividende') || r.includes('div')) return 'dividend';
    if (r.includes('withholding') || r.includes('retenue') || r.includes('tax')) return 'withholding_tax';
    if (r.includes('split') || r.includes('fractionnement')) return 'stock_split';
    return null;
  };

  const normalizeDate = raw => {
    if (!raw) return null;
    if (/^\d{4}-\d{2}-\d{2}/.test(raw)) return raw.substring(0, 10);
    const m = raw.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})/);
    if (m) return `${m[3]}-${('0'+m[2]).slice(-2)}-${('0'+m[1]).slice(-2)}`;
    const m2 = raw.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
    if (m2 && parseInt(m2[1]) <= 12) return `${m2[3].length===2?'20':''}${m2[3]}-${('0'+m2[1]).slice(-2)}-${('0'+m2[2]).slice(-2)}`;
    return null;
  };

  const isDuplicate = tx => {
    const all = Data.transactions.concat(Storage.load());
    return all.some(t => t.ticker === tx.ticker && t.date === tx.date && Math.abs((t.price * t.quantity) - (tx.price * tx.quantity)) < 0.001);
  };

  const normalizeTransaction = (row, map, broker, autoId) => {
    const col = idx => (idx > -1 && row[idx] !== undefined) ? row[idx].replace(/,/g, '.') : '';
    const num = idx => { const v = parseFloat(col(idx)); return isNaN(v) ? 0 : v; };
    const type = normalizeType(col(map.type));
    const ticker = col(map.ticker).toUpperCase().replace(/[^A-Z0-9\.]/g, '');
    const date = normalizeDate(col(map.date));
    const quantity = Math.abs(num(map.quantity));
    const price = Math.abs(num(map.price));
    if (!ticker || !type || !date || quantity === 0) return null;
    return { id: `imp_${autoId}`, ticker, type, quantity, price, fees: Math.abs(num(map.fees)), currency: (col(map.currency) || 'USD').toUpperCase().substring(0,3), tax_withheld: Math.abs(num(map.tax)), date, _imported: true, _broker: broker };
  };

  const process = text => {
    const rows = parseCSV(text);
    if (rows.length < 2) return { ok:[], skipped:[], broker:'Unknown', error:'Fichier vide ou format non reconnu' };
    const headers = rows[0];
    const broker = detectBroker(text, headers);
    const map = mapColumns(headers, broker);
    const ok = [], skipped = []; let dupes = 0;
    for (let i = 1; i < rows.length; i++) {
      if (rows[i].length < 3) continue;
      const tx = normalizeTransaction(rows[i], map, broker, `${Date.now()}_${i}`);
      if (!tx) { skipped.push({row: i+1, reason: 'Ligne ignorée (type/ticker/date manquant)'}); continue; }
      if (isDuplicate(tx)) { dupes++; continue; }
      ok.push(tx);
    }
    return { ok, skipped, dupes, broker, map, headers };
  };

  const applyToPortfolio = () => {
    const imported = Storage.load();
    const manual   = Storage.loadManual();
    Data.transactions = Data.transactions.filter(t => !t._imported && !t._manual);
    for (const tx of imported) Data.transactions.push(tx);
    for (const tx of manual)   Data.transactions.push(tx);
    Calc.recompute();
  };

  return { process, isDuplicate, applyToPortfolio };
})();

    + '<button onclick="goTo(9)" style="padding:12px 24px;border-radius:12px;background:var(--violet);color:#fff;font-weight:700;font-size:13px;cursor:pointer;border:none;margin-bottom:10px">📂 Importer CSV</button>'
    + '<button onclick="goTo(9);setTimeout(function(){switchImportTab(\'manual\');},100)" style="padding:12px 24px;border-radius:12px;background:var(--surface);color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;border:1px solid var(--border)">✏️ Saisie manuelle</button>'
    + '</div>';
}

function buildSVG(pts, col, H) {
  if (!pts || pts.length < 2) return '';
  H = H || 110;
  var W = 360, mn = pts[0], mx = pts[0];
  for (var i = 1; i < pts.length; i++) { if (pts[i] < mn) mn = pts[i]; if (pts[i] > mx) mx = pts[i]; }
  var rng = mx - mn || 1;
  function px(i) { return ((i / (pts.length-1)) * W).toFixed(1); }
  function py(v) { return (H - ((v-mn)/rng*(H*0.82)+H*0.09)).toFixed(1); }
  var d = 'M' + px(0) + ' ' + py(pts[0]);
  for (var j = 1; j < pts.length; j++) d += ' L' + px(j) + ' ' + py(pts[j]);
  var fill = d + ' L' + W + ' ' + H + ' L0 ' + H + ' Z';
  var id   = 'g' + H + (col.replace('#',''));
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;display:block;height:' + H + 'px" preserveAspectRatio="none">'
    + '<defs><linearGradient id="' + id + '" x1="0" y1="0" x2="0" y2="1">'
    + '<stop offset="0%" stop-color="' + col + '" stop-opacity="0.28"/>'
    + '<stop offset="100%" stop-color="' + col + '" stop-opacity="0.02"/>'
    + '</linearGradient></defs>'
    + '<path d="' + fill + '" fill="url(#' + id + ')"/>'
    + '<path d="' + d    + '" fill="none" stroke="' + col + '" stroke-width="1.8" stroke-linejoin="round"/>'
    + '</svg>';
}

/* -- ACCUEIL ---------------------------------------------- */
var _mode = '1Y';
var _hoverIdx = -1;

function renderAccueil(el) {
  el._drawAcc = _drawAccueil;
  _drawAccueil(el);
}

function _drawAccueil(el) {
  /* ── État vide : aucune position ── */
  if (raw.length === 0) {
    el.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:24px 16px;text-align:center">'
      + '<div style="font-size:56px;margin-bottom:20px">📊</div>'
      + '<div style="font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px">Portefeuille vide</div>'
      + '<div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:28px;max-width:280px">Importe un relevé CSV IBKR ou saisis tes actions manuellement pour démarrer.</div>'
      + '<button onclick="goTo(9)" style="width:100%;max-width:300px;padding:14px;border-radius:14px;background:var(--violet);color:#fff;font-weight:700;font-size:15px;cursor:pointer;border:none;margin-bottom:12px">📂 Importer un CSV</button>'
      + '<button onclick="goTo(9);setTimeout(function(){switchImportTab(\'manual\');},100)" style="width:100%;max-width:300px;padding:14px;border-radius:14px;background:var(--surface);color:var(--text);font-weight:700;font-size:15px;cursor:pointer;border:1px solid var(--border)">✏️ Saisie manuelle</button>'
      + '</div>';
    return;
  }

  var pd  = PERF[_mode];
  var col = pd.g >= 0 ? '#10b981' : '#f43f5e';
  var pnl = getPNL(), cost = getCost();
  var pp  = cost > 0 ? pnl/cost*100 : 0;
  var dpnl = 0;
  for (var k = 0; k < raw.length; k++) dpnl += raw[k].dpnl || 0;
  var pts = pd.nav;
  var hIdx = (_hoverIdx >= 0 && _hoverIdx < pts.length) ? _hoverIdx : pts.length - 1;
  var hVal = pts[hIdx], hVal0 = pts[0];
  var hG = hVal - hVal0, hP = hVal0>0?hG/hVal0*100:0;
  var hCol = hG >= 0 ? '#10b981' : '#f43f5e';
  var sorted;
  if (_mode === '1D') {
    // 1 jour : trier par % variation du jour (dpnl / mv)
    sorted = raw.slice().sort(function(a,b){
      var pa = a.mv > 0 ? (a.dpnl||0) / (a.mv - (a.dpnl||0)) * 100 : 0;
      var pb = b.mv > 0 ? (b.dpnl||0) / (b.mv - (b.dpnl||0)) * 100 : 0;
      return pb - pa;
    });
  } else if (_mode === '7D') {
    // 7 jours : trier par P&L% hebdo estimé (pnl * 0.07 proxy ou variation prix récente)
    // On utilise dpnl*5 comme proxy semaine vs pnl long terme
    sorted = raw.slice().sort(function(a,b){
      var va = (a.dpnl||0) * 5;
      var vb = (b.dpnl||0) * 5;
      return vb - va;
    });
  } else if (_mode === 'MTD') {
    // Mois en cours : trier par P&L absolu (meilleur proxy disponible)
    sorted = raw.slice().sort(function(a,b){ return (b.pnl||0) - (a.pnl||0); });
  } else {
    // Long terme 1Y : trier par P&L% total
    sorted = raw.slice().sort(function(a,b){
      var ppa = a.avg > 0 ? (a.price-a.avg)/a.avg*100 : 0;
      var ppb = b.avg > 0 ? (b.price-b.avg)/b.avg*100 : 0;
      return ppb - ppa;
    });
  }
  function mrow(d, cls) {
    var pct = d.avg > 0 ? (d.price-d.avg)/d.avg*100 : 0;
    // % pondéré par volume = PnL% × (MV / totalMV portefeuille)
    var totalMVRef = getMV();
    var weight = totalMVRef > 0 ? d.mv / totalMVRef * 100 : 0;
    var pnlEur = Math.round(toE(d.pnl));
    var pctStr, amtStr;
    if (_mode === '1D') {
      var val = d.dpnl || 0;
      var valE = Math.round(toE(val));
      var dayPct = d.mv > 0 ? (val / (d.mv - val)) * 100 : 0;
      pctStr = (dayPct >= 0 ? '+' : '') + dayPct.toFixed(2) + '%';
      amtStr = (valE >= 0 ? '+' : '') + valE + '\u20ac · ' + weight.toFixed(1) + '% ptf';
    } else if (_mode === '7D') {
      var val7 = (d.dpnl || 0) * 5;
      var val7E = Math.round(toE(val7));
      var w7Pct = d.mv > 0 ? (val7 / d.mv) * 100 : 0;
      pctStr = (w7Pct >= 0 ? '+' : '') + w7Pct.toFixed(2) + '%';
      amtStr = (val7E >= 0 ? '+' : '') + val7E + '\u20ac · ' + weight.toFixed(1) + '% ptf';
    } else if (_mode === 'MTD') {
      pctStr = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
      amtStr = (pnlEur >= 0 ? '+' : '') + pnlEur.toLocaleString('fr-FR') + '\u20ac · ' + weight.toFixed(1) + '% ptf';
    } else {
      pctStr = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
      amtStr = (pnlEur >= 0 ? '+' : '') + pnlEur.toLocaleString('fr-FR') + '\u20ac · ' + weight.toFixed(1) + '% ptf';
    }
    return '<div class="mrow"><span class="mrow-tk">' + d.ticker + '</span>'
      + '<div style="text-align:right">'
      + '<span class="mrow-v ' + cls + '">' + pctStr + '</span>'
      + (amtStr ? '<div style="font-size:9.5px;color:var(--muted);font-family:DM Mono,monospace">' + amtStr + '</div>' : '')
      + '</div></div>';
  }
  var gH = '', lH = '';
  var topN = Math.min(3, sorted.length);
  for (var a = 0; a < topN; a++) gH += mrow(sorted[a], 'up');
  var botStart = sorted.length - 1;
  var botEnd = Math.max(sorted.length - 3, topN);
  for (var b = botStart; b >= botEnd; b--) lH += mrow(sorted[b], 'dn');
  function ctbtn(v, lbl) {
    return '<button class="ctbtn' + (_mode === v ? ' on' : '') + '" data-m="' + v + '">' + lbl + '</button>';
  }
  var mv = getMV();
  var yld = mv > 0 ? getDivA()/mv*100 : 0;
  var yoc = cost > 0 ? getDivA()/cost*100 : 0;
  var sc  = Math.max(0, Math.min(100, Math.round(50 + yld*2.5 + pp*0.3 + yoc*2)));
  var hLabel = hIdx === pts.length-1 ? 'Actuel' : 'J-' + (pts.length-1-hIdx);
  el.innerHTML = ''
    + '<div class="home-label">Portefeuille \u00b7 IBKR \u00b7 ' + new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}) + '</div>'
    + '<div class="home-nav" id="accNav">' + Math.round(hVal/eu()).toLocaleString('fr-FR') + ' \u20ac</div>'
    + '<div class="home-sub">'
    +   '<span class="home-pnl" id="accPnl" style="color:' + hCol + '">' + (hG >= 0 ? '+' : '') + Math.round(hG/eu()).toLocaleString('fr-FR') + ' \u20ac</span>'
    +   '<span class="' + (hG >= 0 ? 'badge-up' : 'badge-dn') + '" id="accPct">' + (hG >= 0 ? '+' : '') + hP.toFixed(2) + '%</span>'
    +   '<span class="mu" style="font-size:11px" id="accLabel">' + hLabel + '</span>'
    +   '<span class="mu" style="font-size:11px">\u00b7 Auj. ' + (dpnl >= 0 ? '+' : '') + Math.round(toE(dpnl)) + '\u20ac</span>'
    + '</div>'
    + '<div class="home-chart" id="accChart"></div>'
    + '<div class="chart-toggle">' + ctbtn('1Y','1 an') + ctbtn('MTD','Mois') + ctbtn('7D','7 j') + ctbtn('1D','Auj.') + '</div>'
    + '<div class="row3">'
    +   '<div class="mini-k"><div class="mini-k-l">Yield</div><div class="mini-k-v up">' + yld.toFixed(2) + '%</div><div class="mini-k-s">' + Math.round(getDivA()/eu()) + '\u20ac/an</div></div>'
    +   '<div class="mini-k"><div class="mini-k-l">YoC</div><div class="mini-k-v" style="color:#86efad">' + yoc.toFixed(2) + '%</div><div class="mini-k-s">Sur co\u00fbt</div></div>'
    +   '<div class="mini-k"><div class="mini-k-l">Score</div><div class="mini-k-v" style="color:#f5a623">' + sc + '</div><div class="mini-k-s">/100</div></div>'
    + '</div>'
    + '<div class="movers">'
    +   '<div><div class="mover-t">\u25b2 Top ' + (_mode==='1D'?'Auj.':_mode) + '</div>' + gH + '</div>'
    +   '<div><div class="mover-t">\u25bc Flop ' + (_mode==='1D'?'Auj.':_mode) + '</div>' + lH + '</div>'
    + '</div>';
  var chartEl = document.getElementById('accChart');
  if (chartEl) _buildInteractiveChart(chartEl, pts, col, hIdx);
  var btns = el.querySelectorAll('.ctbtn');
  for (var ci = 0; ci < btns.length; ci++) {
    (function(b) {
      b.addEventListener('click', function() {
        _mode = b.dataset.m; _hoverIdx = -1; _drawAccueil(el);
      });
    })(btns[ci]);
  }
}

function _buildInteractiveChart(container, pts, col, activeIdx) {
  var W = 360, H = 115;
  var mn = pts[0], mx = pts[0];
  for (var i=1;i<pts.length;i++){if(pts[i]<mn)mn=pts[i];if(pts[i]>mx)mx=pts[i];}
  var rng = mx - mn || 1;
  function px(i){ return ((i/(pts.length-1))*W).toFixed(1); }
  function py(v){ return (H - ((v-mn)/rng*(H*0.82)+H*0.09)).toFixed(1); }
  var d='M'+px(0)+' '+py(pts[0]);
  for(var j=1;j<pts.length;j++) d+=' L'+px(j)+' '+py(pts[j]);
  var fill=d+' L'+W+' '+H+' L0 '+H+' Z';
  var gid='gc'+(col.replace('#',''));
  var aIdx = activeIdx >= 0 ? activeIdx : pts.length-1;
  var ax = parseFloat(px(aIdx)), ay = parseFloat(py(pts[aIdx]));
  container.innerHTML = '<svg id="accSvg" viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block;height:'+H+'px;touch-action:pan-y;cursor:crosshair" preserveAspectRatio="none">'
    +'<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="'+col+'" stop-opacity="0.28"/>'
    +'<stop offset="100%" stop-color="'+col+'" stop-opacity="0.02"/>'
    +'</linearGradient></defs>'
    +'<path d="'+fill+'" fill="url(#'+gid+')" />'
    +'<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="1.8" stroke-linejoin="round"/>'
    +'<line id="chartCursor" x1="'+ax+'" y1="0" x2="'+ax+'" y2="'+H+'" stroke="rgba(255,255,255,.25)" stroke-width="1" stroke-dasharray="3,3"/>'
    +'<circle id="chartDot" cx="'+ax+'" cy="'+ay+'" r="5" fill="'+col+'" stroke="#08080f" stroke-width="2.5"/>'
    +'</svg>';
  var svg = document.getElementById('accSvg');
  if (!svg) return;
  function getIdx(clientX) {
    var rect = svg.getBoundingClientRect();
    var ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return Math.round(ratio * (pts.length-1));
  }
  function updateCursor(idx) {
    var cursor = document.getElementById('chartCursor');
    var dot    = document.getElementById('chartDot');
    var navEl  = document.getElementById('accNav');
    var pnlEl  = document.getElementById('accPnl');
    var pctEl  = document.getElementById('accPct');
    var lblEl  = document.getElementById('accLabel');
    if (!cursor) return;
    var x = parseFloat(px(idx)), y = parseFloat(py(pts[idx]));
    cursor.setAttribute('x1',x); cursor.setAttribute('x2',x);
    if (dot) { dot.setAttribute('cx',x); dot.setAttribute('cy',y); }
    _hoverIdx = idx;
    var hV=pts[idx], h0=pts[0], hG=hV-h0, hP=h0>0?hG/h0*100:0;
    var hC=hG>=0?'#10b981':'#f43f5e';
    if (navEl) navEl.textContent=Math.round(hV/eu()).toLocaleString('fr-FR')+' \u20ac';
    if (pnlEl){pnlEl.textContent=(hG>=0?'+':'')+Math.round(hG/eu()).toLocaleString('fr-FR')+' \u20ac';pnlEl.style.color=hC;}
    if (pctEl){pctEl.textContent=(hG>=0?'+':'')+hP.toFixed(2)+'%';pctEl.className=(hG>=0?'badge-up':'badge-dn');}
    if (lblEl) lblEl.textContent=idx===pts.length-1?'Actuel':'J-'+(pts.length-1-idx);
  }
  svg.addEventListener('mousemove', function(e){ updateCursor(getIdx(e.clientX)); });
  svg.addEventListener('touchstart', function(e){ e.preventDefault(); updateCursor(getIdx(e.touches[0].clientX)); }, {passive:false});
  svg.addEventListener('touchmove', function(e){ e.preventDefault(); e.stopPropagation(); updateCursor(getIdx(e.touches[0].clientX)); }, {passive:false});
  svg.addEventListener('mouseleave', function(){ updateCursor(pts.length-1); });
}

      +(div2>0?'<div style="margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:14px">'
        +'<div><span style="font-size:9px;color:var(--muted)">Yield </span><span style="font-size:11px;font-weight:700;color:#22d47a">'+d.yd.toFixed(1)+'%</span></div>'
        +'<div><span style="font-size:9px;color:var(--muted)">Div/an </span><span style="font-size:11px;font-weight:700;color:#22d47a">'+Math.round(div2*d.qty)+'$</span></div>'
        +'<div><span style="font-size:9px;color:var(--muted)">Qt\u00e9 </span><span style="font-size:11px;font-weight:700">'+d.qty+'</span></div>'
        +'</div>':'')
      +'</div>';
  }
  el.innerHTML = summaryHtml + toggleHtml + rows;
  el._sk = sk; el._sd = sd;
  var btns = el.querySelectorAll('[data-sk]');
  for (var j = 0; j < btns.length; j++) {
    (function(b) {
      b.addEventListener('click', function() {
        var k = b.dataset.sk;
        if (el._sk === k) { el._sd = el._sd === 'asc' ? 'desc' : 'asc'; }
        else { el._sk = k; el._sd = 'asc'; }
        _rendered['rendement'] = 0;
        renderPanel('rendement', el);
      });
    })(btns[j]);
  }
}


function renderSecteurs(el) {
  if (raw.length === 0) { el.innerHTML = _emptyState('🎯', 'Aucun secteur', 'La diversification sectorielle s\'affiche dès que tu as des positions.'); return; }
  var mv = getMV(), map = {};
  for (var i = 0; i < raw.length; i++) {
    var d = raw[i];
    if (!map[d.sec]) map[d.sec] = {mv:0, pnl:0, n:0, tickers:[]};
    map[d.sec].mv  += d.mv;
    map[d.sec].pnl += d.pnl;
    map[d.sec].n   += 1;
    map[d.sec].tickers.push(d);
  }
  var arr = [];
  for (var k in map) arr.push({s:k, mv:map[k].mv, pnl:map[k].pnl, n:map[k].n, tickers:map[k].tickers});
  arr.sort(function(a, b) { return b.mv - a.mv; });
  var cols = {
    'Tech':'#6c63ff','Sant\u00e9':'#00d4a1','Conso.':'#f59e0b',
    'Utilities':'#38bdf8','Finance':'#a78bfa','Immo.':'#fb7185',
    'Industrie':'#34d399','Mat.':'#fbbf24','M\u00e9dias':'#e879f9'
  };

  function buildPie(segments) {
    var W = 200, CX = 100, CY = 100, R = 85, RI = 45;
    var total = 0;
    for (var i=0;i<segments.length;i++) total += segments[i].v;
    var paths = '', labels = '';
    var angle = -Math.PI/2;
    for (var j=0;j<segments.length;j++) {
      var seg = segments[j];
      var sweep = (seg.v/total)*2*Math.PI;
      var x1 = CX + R*Math.cos(angle), y1 = CY + R*Math.sin(angle);
      var x2 = CX + R*Math.cos(angle+sweep), y2 = CY + R*Math.sin(angle+sweep);
      var xi1 = CX + RI*Math.cos(angle), yi1 = CY + RI*Math.sin(angle);
      var xi2 = CX + RI*Math.cos(angle+sweep), yi2 = CY + RI*Math.sin(angle+sweep);
      var lg = sweep > Math.PI ? 1 : 0;
      paths += '<path d="M'+xi1.toFixed(1)+' '+yi1.toFixed(1)+' L'+x1.toFixed(1)+' '+y1.toFixed(1)
        +' A'+R+' '+R+' 0 '+lg+' 1 '+x2.toFixed(1)+' '+y2.toFixed(1)
        +' L'+xi2.toFixed(1)+' '+yi2.toFixed(1)
        +' A'+RI+' '+RI+' 0 '+lg+' 0 '+xi1.toFixed(1)+' '+yi1.toFixed(1)+' Z"'
        +' fill="'+seg.c+'" opacity="0.9" stroke="#08080f" stroke-width="1.5"/>';
      if (sweep > 0.38) {
        var mid = angle + sweep/2;
        var lx = CX + (R+RI)/2*Math.cos(mid), ly = CY + (R+RI)/2*Math.sin(mid);
        labels += '<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" font-size="8" font-weight="700" fill="#fff" font-family="DM Mono,monospace">'+(seg.v/total*100).toFixed(0)+'%</text>';
      }
      angle += sweep;
    }
    var navEur = Math.round(mv/eu()).toLocaleString('fr-FR');
    return '<svg viewBox="0 0 '+W+' '+W+'" style="width:100%;max-width:220px;display:block;margin:0 auto">'
      +paths+labels
      +'<text x="'+CX+'" y="'+(CY-8)+'" text-anchor="middle" font-size="11" fill="#e2e2ec" font-weight="700" font-family="DM Mono,monospace">'+navEur+'\u20ac</text>'
      +'<text x="'+CX+'" y="'+(CY+9)+'" text-anchor="middle" font-size="8" fill="#52527a" font-family="DM Sans,sans-serif">Total</text>'
      +'</svg>';
  }

  var segments = arr.map(function(a){ return {v:a.mv, c:cols[a.s]||'#888', s:a.s}; });

  function pieLegend() {
    var h2 = '<div style="display:flex;flex-wrap:wrap;gap:6px 12px;margin:10px 0 4px;justify-content:center">';
    for (var j=0;j<arr.length;j++) {
      var a=arr[j], w=mv>0?a.mv/mv*100:0, c=cols[a.s]||'#888';
      h2+='<div style="display:flex;align-items:center;gap:4px;font-size:10px">'
        +'<span style="width:10px;height:10px;border-radius:3px;background:'+c+';flex-shrink:0;display:inline-block"></span>'
        +'<span style="color:var(--muted)">'+a.s+'</span>'
        +'<span style="color:var(--text);font-weight:700">'+w.toFixed(1)+'%</span>'
        +'</div>';
    }
    return h2+'</div>';
  }

  var h = '<div class="section-title">Diversification sectorielle</div>'
    +'<div class="card" style="padding:16px 10px 12px">'+buildPie(segments)+pieLegend()+'</div>';

  for (var j = 0; j < arr.length; j++) {
    var a = arr[j], w = mv > 0 ? a.mv/mv*100 : 0;
    var c = cols[a.s] || '#888';
    var pC = a.pnl >= 0 ? 'up' : 'dn';
    h += '<div style="background:var(--surface);border-radius:12px;padding:13px;margin-bottom:10px">'
      +'<div class="sb-top">'
      +'<span class="sb-name" style="font-size:13px;font-weight:700">'+a.s+'</span>'
      +'<span class="sb-info">'+a.n+' pos \u00b7 '+w.toFixed(1)+'% \u00b7 <span class="'+pC+'">'+(a.pnl>=0?'+':'')+Math.round(toE(a.pnl))+'\u20ac</span></span>'
      +'</div>'
      +'<div class="sb-bg" style="margin:8px 0;position:relative"><div class="sb-fill" style="width:'+Math.min(w,100).toFixed(1)+'%;background:'+(w>25?'#f43f5e':c)+'"></div>'
      +'<div style="position:absolute;top:-3px;bottom:-3px;left:25%;width:2px;background:rgba(244,63,94,.7);border-radius:1px" title="Limite 25%"></div>'
      +'</div>'
      +(w>25?'<div style="font-size:9px;color:#f43f5e;font-weight:700;margin-bottom:4px">⚠ Dépasse la limite 25% ('+w.toFixed(1)+'%)</div>':'')
      +'<div style="display:flex;flex-direction:column;gap:0">';
    var tickers = a.tickers.slice().sort(function(x,y){ return y.mv - x.mv; });
    for (var ti=0; ti<tickers.length; ti++) {
      var dd = tickers[ti];
      var wp = mv>0?dd.mv/mv*100:0;
      var ppl = dd.avg>0?(dd.price-dd.avg)/dd.avg*100:0;
      var pplC = ppl>=0?'#22d47a':'#f43f5e';
      var divAnn = (meta[dd.ticker]&&meta[dd.ticker].d||0)*dd.qty;
      h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid rgba(255,255,255,.04)">'
        +'<div><span style="font-size:12.5px;font-weight:700">'+dd.ticker+'</span>'
        +'<span style="font-size:10px;color:var(--muted);margin-left:6px">\u00d7'+dd.qty+'</span></div>'
        +'<div style="text-align:right">'
        +'<span style="font-size:12px;font-family:DM Mono,monospace;font-weight:600">'+Math.round(toE(dd.mv)).toLocaleString('fr-FR')+'\u20ac</span>'
        +'<span style="font-size:10px;color:'+pplC+';margin-left:7px;font-family:DM Mono,monospace;font-weight:600">'+(ppl>=0?'+':'')+ppl.toFixed(1)+'%</span>'
        +(divAnn>0?'<div style="font-size:9px;color:#22d47a">'+Math.round(divAnn)+'$/an</div>':'')
        +'</div></div>';
    }
    h += '</div></div>';
  }
  el.innerHTML = h;
}


function renderDividendes(el) {
  /* ── État vide ── */
  if (raw.length === 0) {
    el.innerHTML = _emptyState('💰', 'Aucun dividende', 'Ajoute des actions à ton portefeuille pour voir les projections Snowball.');
    return;
  }
  /* -- données de base ----------------------------------- */
  var dA   = getDivA() / eu();          // dividende annuel brut en EUR
  var dM   = dA / 12;                   // mensuel brut
  var cost = getCost() / eu();          // PRU total EUR
  var mv   = getMV()   / eu();          // valeur marché EUR
  var yoc  = cost > 0 ? dA/cost*100 : 0;
  var yld  = mv   > 0 ? dA/mv*100   : 0;
  var PFU  = 0.314;                    // 31.4% PFU 2026 (17.2% PS + 12.8% IR)
  var TARGET = 1500;                    // objectif mensuel net

  /* -- état mutable (stocké sur el pour persistance) ------ */
  if (el._divState === undefined) {
    el._divState = {contrib:300, horizon:30, pfu:true, drip:true};
  }
  var S = el._divState;

  /* -- mode switcher (Snowball / Simulation) -------------- */
  if (el._divMode === undefined) el._divMode = 'snowball';

  /* -- si mode simulation, déléguer ----------------------- */
  if (el._divMode === 'simulation') {
    renderSimulation(el);
    return;
  }

  /* -- calcul projection snowball -------------------------- */
  // Formule calée sur index-4 : yield 3,54% · croissance 5,7% · DRIP
  // Résultat : 33 670€ brut en 2056 (30 ans) avec contrib 300€/mois
  function project(contrib, horizon, applyPfu, drip) {
    var rows   = [];
    var YIELD  = 0.0354;   // rendement du capital réinvesti
    var G      = 0.057;    // croissance annuelle dividendes
    var today  = new Date().getFullYear();
    var div    = dA;       // dividende annuel brut EUR de départ
    var port   = mv;       // valeur portefeuille EUR de départ

    for (var y = 1; y <= horizon; y++) {
      var brut = drip
        ? (div + div * YIELD + contrib * 12 * YIELD) * (1 + G)
        : div * (1 + G) + contrib * 12 * YIELD;
      var pfu  = applyPfu ? brut * PFU : 0;
      var net  = brut - pfu;
      var netM = net / 12;
      port = port * (1 + YIELD) + contrib * 12;

      rows.push({
        yr   : today + y,
        brut : Math.round(brut),
        pfu  : Math.round(pfu),
        net  : Math.round(net),
        netM : Math.round(netM),
        port : Math.round(port)
      });

      div = brut;
    }
    return rows;
  }

  /* -- trouver l'année objectif ----------------------------- */
  function findTarget(rows) {
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].netM >= TARGET) return rows[i].yr;
    }
    return '>' + (new Date().getFullYear() + rows.length);
  }

  /* -- SVG multi-courbes projection ------------------------ */
  function projSVG(rows) {
    var W = 340, H = 160;
    var bruts = rows.map(function(r){return r.brut;});
    var nets  = rows.map(function(r){return r.net; });
    var pfus  = rows.map(function(r){return r.pfu; });
    var mx    = Math.max.apply(null, bruts) || 1;
    var tgt   = TARGET * 12;
    function px(i){ return ((i/(rows.length-1))*W).toFixed(1); }
    function py(v){ return (H - (v/mx)*(H*0.88) - H*0.06).toFixed(1); }
    // Courbe brut
    var dB='M'+px(0)+' '+py(bruts[0]);
    for(var i=1;i<bruts.length;i++) dB+=' L'+px(i)+' '+py(bruts[i]);
    // Courbe net
    var dN='M'+px(0)+' '+py(nets[0]);
    for(var j=1;j<nets.length;j++) dN+=' L'+px(j)+' '+py(nets[j]);
    // Fill brut
    var fB=dB+' L'+W+' '+H+' L0 '+H+' Z';
    // Ligne objectif 1500€*12
    var tyP = py(tgt).toString(); // si dans la plage
    var tShow = tgt <= mx;
    return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;display:block" preserveAspectRatio="none">'
      +'<defs>'
      +'<linearGradient id="gb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7c6dff" stop-opacity="0.25"/><stop offset="100%" stop-color="#7c6dff" stop-opacity="0.02"/></linearGradient>'
      +'</defs>'
      +'<path d="'+fB+'" fill="url(#gb)"/>'
      +'<path d="'+dB+'" fill="none" stroke="#7c6dff" stroke-width="2" stroke-linejoin="round"/>'
      +'<path d="'+dN+'" fill="none" stroke="#22d47a" stroke-width="2" stroke-linejoin="round" stroke-dasharray="0"/>'
      +(tShow ? '<line x1="0" y1="'+tyP+'" x2="'+W+'" y2="'+tyP+'" stroke="#f43f5e" stroke-width="1" stroke-dasharray="4,4"/>'
               +'<text x="'+(W-4)+'" y="'+(parseFloat(tyP)-4)+'" fill="#f43f5e" font-size="9" text-anchor="end">'+TARGET+'\u20ac</text>' : '')
      +'</svg>';
  }

  /* -- légende SVG ------------------------------------------ */
  function legend() {
    return '<div style="display:flex;gap:14px;margin-top:8px;font-size:10.5px;color:var(--muted)">'
      +'<span style="display:flex;align-items:center;gap:4px"><span style="width:18px;height:2px;background:#7c6dff;display:inline-block;border-radius:1px"></span>Brut</span>'
      +'<span style="display:flex;align-items:center;gap:4px"><span style="width:18px;height:2px;background:#22d47a;display:inline-block;border-radius:1px"></span>Net</span>'
      +'<span style="display:flex;align-items:center;gap:4px"><span style="width:18px;height:2px;background:#f43f5e;display:inline-block;border-radius:1px;border-top:1px dashed #f43f5e"></span>PFU '+Math.round(PFU*100)+'%</span>'
      +'</div>';
  }

  /* -- tableau projection ----------------------------------- */
  function tableRows(rows) {
    var h='';
    for(var i=0;i<rows.length;i++){
      var r=rows[i];
      var isTarget = r.netM >= TARGET;
      h+='<tr style="'+(isTarget?'background:rgba(34,212,122,.06)':'')+'">'
        +'<td class="fw7 mono">'+(isTarget?'<span style="display:inline-flex;align-items:center;gap:3px">'+r.yr+'<span style="font-size:9px">\uD83C\uDFAF</span></span>':r.yr)+'</td>'
        +'<td class="mono" style="text-align:right;color:#7c6dff">'+r.port.toLocaleString('fr-FR')+'\u20ac</td>'
        +'<td class="mono up" style="text-align:right">'+r.brut.toLocaleString('fr-FR')+'\u20ac</td>'
        +'<td class="mono" style="text-align:right;color:#86efad">'+r.net.toLocaleString('fr-FR')+'\u20ac</td>'
        +'<td class="mono" style="text-align:right;color:#86efad">'+r.netM.toLocaleString('fr-FR')+'\u20ac</td>'
        +'</tr>';
    }
    return h;
  }

  /* -- RENDER COMPLET --------------------------------------- */
  function draw() {
    var rows   = project(S.contrib, S.horizon, S.pfu, S.drip);
    var yrObj  = findTarget(rows);
    var yrsTo  = typeof yrObj==='number' ? (yrObj - new Date().getFullYear()) + ' ans' : 'N/A';
    var netAnn = Math.round(dA * (S.pfu ? (1-PFU) : 1));
    var netMon = Math.round(netAnn/12);

    el.innerHTML = ''
      /* Mode switcher */
      +'<div style="display:flex;gap:0;background:var(--surface);border-radius:10px;padding:3px;margin-bottom:14px;width:fit-content">'
      +'<button id="btnModeSnowball" onclick="(function(){var p=document.getElementById(\'panel-dividendes\');if(p){p._divMode=\'snowball\';renderDividendes(p);}})()" '
      +'style="padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;transition:all .15s;cursor:pointer;border:none;'
      +(el._divMode==='snowball'?'background:var(--violet);color:#fff;':'background:transparent;color:var(--muted);')
      +'">📈 Snowball</button>'
      +'<button id="btnModeSimu" onclick="(function(){var p=document.getElementById(\'panel-dividendes\');if(p){p._divMode=\'simulation\';renderDividendes(p);}})()" '
      +'style="padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;transition:all .15s;cursor:pointer;border:none;'
      +(el._divMode==='simulation'?'background:var(--violet);color:#fff;':'background:transparent;color:var(--muted);')
      +'">🧮 Simulation</button>'
      +'</div>'

      /* Titre */
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">'
      +'<span style="font-size:22px">\uD83D\uDCB0</span>'
      +'<div><div class="section-title" style="margin:0">Dividendes</div>'
      +'<div class="mu" style="font-size:11px">Projection Snowball \u00b7 PFU '+Math.round(PFU*100)+'% \u00b7 Objectif '+TARGET+'\u20ac net</div>'
      +'</div></div>'

      /* 4 KPI cards */
      +'<div class="row2" style="margin-top:14px">'
      +'<div class="card"><div class="mini-k-l">ANNUEL BRUT</div>'
      +'<div class="mini-k-v up" style="font-size:26px;margin:4px 0">'+Math.round(dA).toLocaleString('fr-FR')+'\u20ac</div>'
      +'<div class="mu" style="font-size:11px">'+yld.toFixed(2)+'% yield sur MV</div></div>'
      +'<div class="card"><div class="mini-k-l">ANNUEL NET ~</div>'
      +'<div class="mini-k-v" style="font-size:26px;margin:4px 0;color:#86efad">'+netAnn.toLocaleString('fr-FR')+'\u20ac</div>'
      +'<div class="mu" style="font-size:11px">Apr\u00e8s PFU '+Math.round(PFU*100)+'%</div></div>'
      +'</div>'

      +'<div class="row2">'
      +'<div class="card"><div class="mini-k-l">YIELD ON COST</div>'
      +'<div class="mini-k-v up" style="font-size:26px;margin:4px 0">'+yoc.toFixed(2)+'%</div>'
      +'<div class="mu" style="font-size:11px">Sur PRU moyen</div></div>'
      +'<div class="card" style="border:1px solid rgba(34,212,122,.2)">'
      +'<div class="mini-k-l">OBJECTIF '+TARGET+'\u20ac NET</div>'
      +'<div class="mini-k-v up" style="font-size:26px;margin:4px 0">'+yrObj+'</div>'
      +'<div class="mu" style="font-size:11px">En '+yrsTo+'</div></div>'
      +'</div>'

      /* Sliders */
      +'<div class="row2">'
      +'<div class="card">'
      +'<div class="mini-k-l">CONTRIBUTION MENSUELLE</div>'
      +'<div class="mono fw7" style="font-size:22px;margin:8px 0" id="divContribVal">'+S.contrib+'\u20ac</div>'
      +'<input type="range" id="divContrib" min="0" max="2000" step="50" value="'+S.contrib+'" style="width:100%;touch-action:none">'
      +'</div>'
      +'<div class="card">'
      +'<div class="mini-k-l">HORIZON (ANS) : '+S.horizon+'</div>'
      +'<div class="mono fw7" style="font-size:22px;margin:8px 0" id="divHorizonVal">'+S.horizon+' ans</div>'
      +'<input type="range" id="divHorizon" min="5" max="40" step="1" value="'+S.horizon+'" style="width:100%;touch-action:none">'
      +'</div>'
      +'</div>'

      +'<div class="row2">'
      +'<div class="card"><div class="mini-k-l">PFU '+Math.round(PFU*100)+'%</div>'
      +'<div style="display:flex;align-items:center;gap:10px;margin-top:10px">'
      +'<label class="toggle"><input type="checkbox" id="divPfu"'+(S.pfu?' checked':'')+'><span class="toggle-slider"></span></label>'
      +'<span style="font-size:13px">Apr\u00e8s imp\u00f4ts</span>'
      +'</div></div>'
      +'<div class="card"><div class="mini-k-l">DRIP (R\u00c9INVESTISSEMENT)</div>'
      +'<div style="display:flex;align-items:center;gap:10px;margin-top:10px">'
      +'<label class="toggle"><input type="checkbox" id="divDrip"'+(S.drip?' checked':'')+'><span class="toggle-slider"></span></label>'
      +'<span style="font-size:13px">R\u00e9investir les div.</span>'
      +'</div></div>'
      +'</div>'

      /* Graphique projection */
      +'<div class="card" style="padding:14px 12px 10px">'
      +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px">PROJECTION '+S.horizon+' ANS</div>'
      +projSVG(rows)
      +legend()
      +'</div>'

      /* Tableau détaillé */
      +'<div class="twrap" style="margin-top:4px"><table>'
      +'<thead><tr>'
      +'<th>ANN\u00c9E</th>'
      +'<th style="text-align:right">PORTFOLIO</th>'
      +'<th style="text-align:right">BRUT /AN</th>'
      +'<th style="text-align:right">NET /AN</th>'
      +'<th style="text-align:right">NET /MOIS</th>'
      +'</tr></thead>'
      +'<tbody>'+tableRows(rows)+'</tbody>'
      +'</table></div>';

    /* -- Bind events --------------------------------------- */
    function bindSlider(id, valId, key, suffix, redraw) {
      var sl = document.getElementById(id);
      var vl = document.getElementById(valId);
      if (!sl) return;
      sl.addEventListener('input', function() {
        S[key] = +this.value;
        if (vl) vl.textContent = this.value + suffix;
        if (redraw) draw();
      });
      sl.addEventListener('touchmove', function(e){ e.stopPropagation(); },{passive:true});
      sl.addEventListener('change', function(){ draw(); });
    }
    bindSlider('divContrib',  'divContribVal',  'contrib',  '\u20ac', false);
    bindSlider('divHorizon',  'divHorizonVal',  'horizon',  ' ans',  false);

    var pfuCk = document.getElementById('divPfu');

    var drpCk = document.getElementById('divDrip');
    if (drpCk) drpCk.addEventListener('change', function(){ S.drip = this.checked; draw(); });
  }

  try {

  } catch(e) {
    el.innerHTML = '<div style="padding:20px;color:#f43f5e;font-size:13px;font-family:monospace;background:rgba(244,63,94,.08);border-radius:10px;margin:10px">'
      + '<div style="font-weight:700;margin-bottom:6px">⚠️ Erreur Dividendes</div>'
      + e.message + '<br><br>'

}


/* -- SIMULATION AVANCÉE (Projection Engine) --------------- */
function renderSimulation(el) {
  var PFU_RATE = 0.314;
  var mv   = getMV() / eu();
  var dA   = getDivA() / eu();

  /* état simulation */
  if (!el._simState) {
    el._simState = {
      portVal   : Math.round(mv) || 50000,
      contrib   : 300,
      divGrowth : 5,
      drip      : true,
      inflation : 2,
      taxRate   : 31,
      years     : 30,
      fireTarget: 1500
    };
  }
  var T = el._simState;

  /* ---- moteur de calcul ---- */
  function simulatePortfolioGrowth(opts) {
    var port      = opts.portVal;
    var contrib   = opts.contrib;
    var gRate     = opts.divGrowth / 100;
    var drip      = opts.drip;
    var infRate   = opts.inflation / 100;
    var taxRate   = opts.taxRate / 100;
    var years     = opts.years;
    var baseYield = dA > 0 && mv > 0 ? dA / mv : 0.035;
    var today     = new Date().getFullYear();
    var rows      = [];
    var divAnn    = port * baseYield;
    var fireYear  = null;

    for (var y = 1; y <= years; y++) {
      /* dividendes bruts */
      var grossDiv = divAnn;
      if (drip) grossDiv += divAnn * baseYield + contrib * 12 * baseYield;
      else      grossDiv += contrib * 12 * baseYield;

      /* fiscalité */
      var taxAmt   = grossDiv * taxRate;
      var netDiv   = grossDiv - taxAmt;
      var netMonth = netDiv / 12;

      /* inflation ajustée */
      var realNet  = netDiv / Math.pow(1 + infRate, y);
      var realNetM = realNet / 12;

      /* portfolio value */
      port = port * (1 + baseYield) + contrib * 12;

      /* yield on cost */
      var initCost = opts.portVal + opts.contrib * 12 * y;
      var yoc      = initCost > 0 ? (grossDiv / initCost * 100) : 0;

      /* FIRE check */
      if (!fireYear && netMonth >= opts.fireTarget) fireYear = today + y;

      rows.push({
        yr      : today + y,
        port    : Math.round(port),
        gross   : Math.round(grossDiv),
        tax     : Math.round(taxAmt),
        net     : Math.round(netDiv),
        netM    : Math.round(netMonth),
        realNetM: Math.round(realNetM),
        yoc     : yoc.toFixed(2)
      });

      divAnn = grossDiv;
    }

    return { rows: rows, fireYear: fireYear };
  }

  function draw() {
    var result   = simulatePortfolioGrowth(T);
    var rows     = result.rows;
    var fireYear = result.fireYear;
    var lastRow  = rows[rows.length - 1] || {};
    var yrsToFire = fireYear ? (fireYear - new Date().getFullYear()) + ' ans' : 'N/A';

    /* SVG chart */
    function simSVG() {
      if (rows.length < 2) return '';
      var W = 340, H = 160;

      var gross = rows.map(function(r){return r.gross;});
      var mx    = Math.max.apply(null, gross) || 1;
      var tgt   = T.fireTarget * 12;
      function px(i){ return ((i/(rows.length-1))*W).toFixed(1); }
      function py(v){ return (H - (v/mx)*(H*0.88) - H*0.06).toFixed(1); }
      var dG='M'+px(0)+' '+py(gross[0]);
      for(var i=1;i<gross.length;i++) dG+=' L'+px(i)+' '+py(gross[i]);
      var dN='M'+px(0)+' '+py(nets[0]);
      for(var j=1;j<nets.length;j++) dN+=' L'+px(j)+' '+py(nets[j]);
      var fG=dG+' L'+W+' '+H+' L0 '+H+' Z';
      var tyP = py(tgt);
      var tShow = tgt <= mx;
      return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;display:block" preserveAspectRatio="none">'
        +'<defs><linearGradient id="gs" x1="0" y1="0" x2="0" y2="1">'
        +'<stop offset="0%" stop-color="#00c8a0" stop-opacity="0.25"/>'
        +'<stop offset="100%" stop-color="#00c8a0" stop-opacity="0.02"/>'
        +'</linearGradient></defs>'
        +'<path d="'+fG+'" fill="url(#gs)"/>'
        +'<path d="'+dG+'" fill="none" stroke="#00c8a0" stroke-width="2" stroke-linejoin="round"/>'
        +'<path d="'+dN+'" fill="none" stroke="#22d47a" stroke-width="2" stroke-linejoin="round"/>'
        +(tShow?'<line x1="0" y1="'+tyP+'" x2="'+W+'" y2="'+tyP+'" stroke="#f5a623" stroke-width="1" stroke-dasharray="4,4"/>'
               +'<text x="'+(W-4)+'" y="'+(parseFloat(tyP)-4)+'" fill="#f5a623" font-size="9" text-anchor="end">FIRE '+T.fireTarget+'€</text>':'')
