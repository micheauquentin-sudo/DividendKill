<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#08080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Portfolio IBKR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- Écran de connexion -->
<div class="login-overlay" id="loginOverlay" style="display:none">
  <div class="login-card">
    <div class="login-logo">port<em>folio</em></div>
    <p class="login-tagline">Tes dividendes, un clic</p>
    <button class="login-google-btn" onclick="authLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908C16.658 14.233 17.64 11.925 17.64 9.2z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continuer avec Google
    </button>
    <p class="login-note">Accès sécurisé · Données privées</p>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <div class="logo">port<em>folio</em><span class="logo-tag">BETA</span></div>
  <div class="nav-status" id="navStatus">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusTxt">Prix...</span>
  </div>
  <div class="nav-right">
    <button class="sync-btn" onclick="syncIBKR()">&#8635; Sync</button>
    <button class="nav-user-btn" id="navUserBtn" onclick="authLogout()" title="Déconnexion" style="display:none">
      <span id="navUserInitial" class="nav-user-initial"></span>
    </button>
  </div>
</nav>

<!-- KPI BAR -->
<div class="kpi-bar on" id="kpiBar">
  <div class="kc"><div class="kc-l">Portfolio</div><div class="kc-v" id="kv0">--</div><div class="kc-s" id="ks0">--</div></div>
  <div class="kc"><div class="kc-l">Revenu/mois</div><div class="kc-v up" id="kv1">--</div><div class="kc-s" id="ks1">--</div></div>
  <div class="kc"><div class="kc-l">Yield</div><div class="kc-v up" id="kv2">--</div><div class="kc-s" id="ks2">--</div></div>
  <div class="kc"><div class="kc-l">FIRE</div><div class="kc-v" id="kv3">--</div><div class="kc-s" id="ks3">--</div></div>
  <div class="kpi-sync" title="D1 Sync">
    <div class="kpi-sync-dot" id="syncDot"></div>
    <div class="kpi-sync-lbl">D1</div>
  </div>
</div>

<!-- PANELS -->
<div id="panel-accueil"      class="panel on"></div>
<div id="panel-rendement"    class="panel"></div>
<div id="panel-secteurs"     class="panel"></div>
<div id="panel-dividendes"   class="panel"></div>
<div id="panel-calendar"     class="panel"></div>
<div id="panel-deal"         class="panel"></div>
<div id="panel-valorisation" class="panel"></div>
<div id="panel-news"         class="panel"></div>
<div id="panel-impots"       class="panel"></div>
<div id="panel-import"       class="panel"></div>

<!-- TABS -->
<div class="tabs" id="mainTabs">
  <div class="tab on"  data-p="accueil">     <span class="tab-icon">&#127968;</span>ACCUEIL</div>
  <div class="tab"     data-p="rendement">   <span class="tab-icon">&#128202;</span>PORTEF.</div>
  <div class="tab"     data-p="secteurs">    <span class="tab-icon">&#127919;</span>DIVERSIF.</div>
  <div class="tab"     data-p="dividendes">  <span class="tab-icon">&#128176;</span>DIVIDENDES</div>
  <div class="tab"     data-p="calendar">    <span class="tab-icon">&#128197;</span>CALENDRIER</div>
  <div class="tab"     data-p="deal">        <span class="tab-icon">&#128142;</span>DEAL</div>
  <div class="tab"     data-p="valorisation"><span class="tab-icon">&#128200;</span>VALORISATION</div>
  <div class="tab"     data-p="news">        <span class="tab-icon">&#128240;</span>NEWS</div>
  <div class="tab"     data-p="impots">      <span class="tab-icon">&#9878;</span>IMP&Ocirc;TS</div>
  <div class="tab"     data-p="import">      <span class="tab-icon">&#128229;</span>IMPORT</div>
</div>

<!-- FAB button -->
<button class="fab" id="mainFAB" onclick="openFABSheet()" aria-label="Ajouter une transaction">&#65291;</button>

<!-- Bottom sheet overlay -->
<div id="bs-overlay" class="bs-overlay" style="display:none" onclick="closeFABSheet()"></div>

<!-- Bottom sheet -->
<div id="bs-sheet" class="bs-sheet" style="display:none">
  <div class="bs-handle" onclick="closeFABSheet()"></div>
  <div class="bs-title">&#65291; Transaction</div>
  <label class="bs-label">Type</label>
  <select class="bs-field" id="fab-type" style="margin-bottom:12px">
    <option value="buy">&#9650; Achat</option>
    <option value="sell">&#9660; Vente</option>
    <option value="dividend">$ Dividende reçu</option>
  </select>
  <div>
    <label class="bs-label">Action / Ticker</label>
    <input class="bs-field" id="fab-ticker" placeholder="ex: JNJ, ADP, MMM…"
      autocomplete="off" autocorrect="off" spellcheck="false"
      oninput="fabTickerInput(this.value)"
      style="text-transform:uppercase;margin-bottom:6px">
    <div id="fab-suggestions"></div>
    <div class="fab-isin-tag" id="fab-isin-tag"></div>
  </div>
  <div>
    <label class="bs-label">Quantité</label>
    <input class="bs-field" id="fab-qty" type="number" placeholder="10" min="0.001" step="any" style="margin-bottom:8px">
  </div>
  <div class="bs-row">
    <div>
      <label class="bs-label">Prix ($)</label>
      <input class="bs-field" id="fab-price" type="number" placeholder="94.50" min="0" step="any">
    </div>
    <div>
      <label class="bs-label">Date</label>
      <input class="bs-field" id="fab-date" type="date">
    </div>
  </div>
  <div id="fab-error" style="color:#f43f5e;font-size:12px;margin:4px 0 6px;display:none"></div>
  <div class="bs-btn-row">
    <button class="bs-btn-cancel" onclick="closeFABSheet()">Annuler</button>
    <button class="bs-btn" onclick="submitFABTx()">Enregistrer</button>
  </div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
