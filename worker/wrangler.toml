name            = "divkiller"
main            = "src/index.js"
compatibility_date = "2025-01-01"

[assets]
directory = "../dist"

[vars]
# Ton Google OAuth Client ID (public — visible dans les URLs OAuth)
# Obtiens-le sur https://console.cloud.google.com → APIs & Services → Credentials
# Puis remplace cette valeur et redéploie
GOOGLE_CLIENT_ID = "769761273591-97hctc8bs7f46so6tqhc6cb3a0mghovb.apps.googleusercontent.com"

[triggers]
crons = ["30 22 * * 1-5"]

[[d1_databases]]
binding       = "DB"
database_name = "dividendkill"
database_id   = "f931a856-8175-42d5-91fa-9b72c1fa964f"

[[r2_buckets]]
binding     = "BACKUPS"
bucket_name = "dividendkill-backups"

[[kv_namespaces]]
binding = "PRICES_KV"
id      = "f991055139244638b2eeda97ef31bf46"

# Secrets — set via CLI (never commit these):
#   wrangler secret put PORTFOLIO_TOKEN   ← token Bearer pour l'auth
#   wrangler secret put FMP_KEY           ← clé API Financial Modeling Prep
#   wrangler secret put FINNHUB_KEY       ← clé API Finnhub (fallback principal EPS/payout, 60 req/min gratuit)
#   wrangler secret put TWELVEDATA_KEY    ← clé API Twelve Data (fallback secondaire prix + EPS/payout/dividendes)
# AV_KEY (Alpha Vantage) retiré du pipeline (2026-07-03) — quota 25 req/jour trop juste
# dès qu'un portefeuille dépasse quelques tickers non couverts par Finnhub. Le secret
# peut être supprimé du dashboard Cloudflare (wrangler secret delete AV_KEY).
